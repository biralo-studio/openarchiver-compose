version: '3.8'

services:
  open-archiver:
    image: logiclabshq/open-archiver:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT_BACKEND: 4000
      PORT_FRONTEND: 3000
      APP_URL: ${APP_URL}
      ORIGIN: ${ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STORAGE_ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY}
      POSTGRES_DB: open_archive
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgres://admin:${POSTGRES_PASSWORD}@postgres:5432/open_archive
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_HOST: http://meilisearch:7700
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_TLS_ENABLED: "false"
      STORAGE_TYPE: s3
      STORAGE_LOCAL_ROOT_PATH: /var/data/open-archiver
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET}
      STORAGE_S3_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID}
      STORAGE_S3_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION}
      STORAGE_S3_FORCE_PATH_STYLE: true
      BODY_SIZE_LIMIT: 100M
      SYNC_FREQUENCY: "* * * * *"
      ALL_INCLUSIVE_ARCHIVE: "false"
      ENABLE_DELETION: "false"
      TIKA_URL: http://tika:9998
      
    ports:
      - "4000:4000"
      - "3000:3000"
    depends_on:
      - postgres
      - valkey
      - meilisearch
    volumes:
      - ./data/open-archiver:/var/data/open-archiver

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: open_archive
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:latest
    restart: unless-stopped
    environment:
      VALKEY_PASSWORD: ${REDIS_PASSWORD}
    command: ["valkey-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data

volumes:
  postgres-data:
  meili-data:
